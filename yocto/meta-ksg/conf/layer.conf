# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-ksg"
BBFILE_PATTERN_meta-ksg = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-ksg = "6"

LAYERDEPENDS_meta-ksg = "core"
LAYERSERIES_COMPAT_meta-ksg = "scarthgap"
