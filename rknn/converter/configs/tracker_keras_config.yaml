# RKNN Model Conversion Configuration (Keras)

model:
  name: "tracker_ver4_keras"
  keras_model_path: "../../training/tracker/tracker_ver4/outputs/tracker.h5"
  output_rknn_path: "./outputs/tracker_keras.rknn"

rknn_config:
  # Target platform for Radxa Zero 3 (RK3566)
  target_platform: "rk3566"
  
  # Optimization level (0, 1, 2, 3). 3 is the highest optimization level.
  optimization_level: 3
  
  # Normalization parameters (mean and std values) for inputs.
  mean_values: [[0], [0]]
  std_values: [[255], [255]]

quantization:
  # Enable INT8 quantization. If false, model compiles in FP16.
  do_quantization: true
  
  # Path to the calibration dataset descriptor file
  dataset_path: "./configs/dataset.txt"
  
  # Quantization algorithm: 'normal' or 'mmse' (MMSE can provide better accuracy for some models)
  quantized_algorithm: "normal"
  
  # Quantized dtype: 'asymmetric_quantized-8' (INT8)
  quantized_dtype: "asymmetric_quantized-8"

# Input tensor details
inputs:
  - name: "reference_stack"
    shape: [16, 32, 32, 1]
  - name: "search_frame"
    shape: [256, 256, 1]

# Custom Keras layers/objects to load before converting to ONNX
custom_objects:
  - name: "SafeGroupNormalization"
    module: "tracker_model"
    path: "../../training/tracker/tracker_ver4"
